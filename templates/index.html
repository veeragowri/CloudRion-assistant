<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudRion AI Assistant</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<button type="button" id="chat-launcher" class="chat-launcher" onclick="openChat()" aria-label="Open CloudRion Assistant">
    <img src="/static/images/bot-animation.gif?v=classic-detail" alt="Chat robot" class="launcher-bot-gif">
</button>

<div class="chat-container is-hidden" id="chat-widget">

    <div class="chat-header">
        <div class="header-bot" aria-hidden="true">
            <img src="/static/images/cloudrion-c-logo.png?v=circle3" alt="" class="brand-mark brand-mark--header">
        </div>
        <div class="header-text">
            <span class="header-title">CloudRion AI Assistant</span>
            <span class="header-tagline">Smart Software, Limitless Possibilities</span>
        </div>
        <button type="button" class="header-close" onclick="closeChat()" aria-label="Close chat">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </button>
    </div>

    <div id="chat-box"></div>

    <div class="input-area">
        <input
            type="text"
            id="message"
            placeholder="Type your message..."
            autocomplete="off">

        <button type="button" class="send-btn" onclick="sendMessage()" aria-label="Send message">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
        </button>
    </div>

</div>

<!-- Book Demo Form -->
<div id="demoModal" class="modal" hidden>
    <div class="modal-content" onclick="event.stopPropagation()">
        <button type="button" class="close" onclick="closeDemoForm()" aria-label="Close">&times;</button>
        <div class="modal-bot" aria-hidden="true">
            <img src="/static/images/cloudrion-c-logo.png?v=circle3" alt="" class="brand-mark brand-mark--modal">
        </div>
        <h2>📅 Book a Demo</h2>
        <p class="modal-subtitle">Fill in your details and we'll schedule your personalized demo.</p>
        <p id="demoFormError" class="form-error" hidden></p>

        <form id="demoForm" novalidate>
            <input type="text" id="demoName" name="name" placeholder="Full Name" required autocomplete="name">
            <input type="text" id="demoCompany" name="company" placeholder="Company Name" required autocomplete="organization">
            <input type="email" id="demoEmail" name="email" placeholder="Email" required autocomplete="email">
            <input type="text" id="demoPhone" name="phone" placeholder="Phone Number" required autocomplete="tel">

            <select id="demoProduct" name="product" required>
                <option value="">Select Product of Interest</option>
                <option>CloudRion CRM</option>
                <option>CloudRion ERP</option>
                <option>CloudRion HRMS</option>
                <option>CloudRion Billing</option>
            </select>

            <div class="form-row">
                <input type="date" id="demoDate" name="date" required>
                <input type="time" id="demoTime" name="time" required>
            </div>

            <button type="submit" id="demoSubmitBtn">Book Demo</button>
        </form>
    </div>
</div>

<!-- Raise Ticket Form -->
<div id="ticketModal" class="modal" hidden>
    <div class="modal-content" onclick="event.stopPropagation()">
        <button type="button" class="close" onclick="closeTicketForm()" aria-label="Close">&times;</button>
        <div class="modal-bot" aria-hidden="true">
            <img src="/static/images/cloudrion-c-logo.png?v=circle3" alt="" class="brand-mark brand-mark--modal">
        </div>
        <h2>🎫 Raise Support Ticket</h2>
        <p class="modal-subtitle">Describe your issue and our technical team will get back to you.</p>
        <p id="ticketFormError" class="form-error" hidden></p>

        <form id="ticketForm" novalidate>
            <input type="text" id="ticketName" name="name" placeholder="Full Name" required autocomplete="name">
            <input type="text" id="ticketCompany" name="company" placeholder="Company Name" required autocomplete="organization">
            <input type="email" id="ticketEmail" name="email" placeholder="Email" required autocomplete="email">
            <input type="text" id="ticketPhone" name="phone" placeholder="Phone Number" required autocomplete="tel">

            <select id="ticketProduct" name="product" required>
                <option value="">Select CloudRion Product</option>
                <option>CloudRion CRM</option>
                <option>CloudRion ERP</option>
                <option>CloudRion HRMS</option>
                <option>CloudRion Billing</option>
            </select>

            <textarea id="ticketIssue" name="issue" placeholder="Describe your issue" required></textarea>

            <button type="submit" id="ticketSubmitBtn">Submit Ticket</button>
        </form>
    </div>
</div>

<script src="/static/script.js"></script>

</body>
</html>
